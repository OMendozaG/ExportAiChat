<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Chat Export AI Offscreen PDF</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      #offscreen-pdf-root {
        position: fixed;
        left: -200vw;
        top: 0;
        width: 1240px;
        min-height: 10px;
        pointer-events: none;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="offscreen-pdf-root" aria-hidden="true"></div>
    <script src="../vendor/html2pdf.bundle.min.js"></script>
    <script src="./offscreen-pdf.js"></script>
  </body>
</html>
