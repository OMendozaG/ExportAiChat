<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat Export AI</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <main class="popup">
    <header class="title-row">
      <h1>Chat Export AI</h1>
      <button id="openOptions" class="icon-button" type="button" aria-label="Open settings">
        <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
          <path d="M19.14,12.94 C19.19,12.64 19.22,12.32 19.22,12C19.22,11.68 19.19,11.36 19.14,11.06L21.2,9.37C21.39,9.22 21.45,8.96 21.34,8.74L19.49,5.26C19.38,5.05 19.13,4.95 18.9,5.02L16.48,5.9C16.01,5.56 15.5,5.27 14.93,5.05L14.5,2.53C14.47,2.3 14.27,2.14 14.03,2.14H9.97C9.73,2.14 9.53,2.3 9.5,2.53L9.07,5.05C8.5,5.27 7.99,5.56 7.52,5.9L5.1,5.02C4.87,4.95 4.62,5.05 4.51,5.26L2.66,8.74C2.55,8.95 2.61,9.21 2.8,9.37L4.86,11.06C4.81,11.36 4.78,11.68 4.78,12C4.78,12.32 4.81,12.64 4.86,12.94L2.8,14.63C2.61,14.78 2.55,15.04 2.66,15.26L4.51,18.74C4.62,18.95 4.87,19.05 5.1,18.98L7.52,18.1C7.99,18.44 8.5,18.73 9.07,18.95L9.5,21.47C9.53,21.7 9.73,21.86 9.97,21.86H14.03C14.27,21.86 14.47,21.7 14.5,21.47L14.93,18.95C15.5,18.73 16.01,18.44 16.48,18.1L18.9,18.98C19.13,19.05 19.38,18.95 19.49,18.74L21.34,15.26C21.45,15.05 21.39,14.79 21.2,14.63L19.14,12.94ZM12,15.5C10.07,15.5 8.5,13.93 8.5,12C8.5,10.07 10.07,8.5 12,8.5C13.93,8.5 15.5,10.07 15.5,12C15.5,13.93 13.93,15.5 12,15.5Z"></path>
        </svg>
      </button>
    </header>

    <p id="status" class="status">Checking current page...</p>

    <section id="summary" class="summary-card" hidden>
      <div class="summary-row">
        <span class="summary-label">Provider</span>
        <span id="summaryProvider" class="summary-value"></span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Chat Name</span>
        <span id="summaryChatName" class="summary-value"></span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Messages</span>
        <span id="summaryMessages" class="summary-value"></span>
      </div>
    </section>

    <section id="actions" class="actions" hidden>
      <button id="exportPdf" type="button">.PDF</button>
      <button id="exportMht" type="button">.MHT</button>
      <button id="exportHtml" type="button">.HTML</button>
      <button id="exportTxt" type="button">.TXT</button>
    </section>
  </main>

  <script src="../shared/namespace.js"></script>
  <script src="../shared/constants.js"></script>
  <script src="../shared/default-settings.js"></script>
  <script src="../shared/chrome-helpers.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/app-theme.js"></script>
  <script src="../shared/button-system.js"></script>
  <script src="./popup.js"></script>
</body>
</html>
